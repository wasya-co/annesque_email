
services:

  app:
    image: piousbox/ruby275-nginx:0.0.16
    command: sh -c " \
      /opt/rbenv/shims/bundle --path vendor/bundle && \
      /opt/rbenv/shims/bundle exec rake db:seed && \
      /opt/rbenv/shims/bundle exec rake assets:precompile && \
      /opt/rbenv/shims/bundle exec puma -C config/puma.rb "
    container_name: app
    depends_on:
      - localstack
      - mongo
      - redis
    environment:
      - AWS_REGION=us-east-1
      - PORT=9002
      - EMAIL=${EMAIL}
      - PASSWORD=${PASSWORD}
      - POSTAL_API_SECRET=${POSTAL_API_SECRET}
      - RAILS_ENV=production
      - REDIS_URL=redis://redis:6379/0
    # init: true
    # networks:
    #   - internal_db_net
    ports:
      - "127.0.0.1:9002:9002"
    volumes:
      - vendor_bundle:/opt/projects/packagedapp/vendor/bundle:cached
      - type: bind
        source: ./volumes/root
        target: /root
      - type: bind
        source: ./
        target: /opt/projects/packagedapp
    restart: 'unless-stopped'



  app_worker_ctxs:
    image: piousbox/ruby275-nginx:0.0.16
    command: sh -c " \
      /opt/rbenv/shims/bundle --path vendor/bundle && \
      /opt/rbenv/shims/bundle exec rake -T && \
      /opt/rbenv/shims/bundle exec rake wco_email:send_contexts "
    container_name: app_worker_ctxs
    # depends_on:
    #   - mongo
    #   - redis
    environment:
      - AWS_REGION=us-east-1
      - PORT=9002
      - EMAIL=${EMAIL}
      - PASSWORD=${PASSWORD}
      - POSTAL_API_SECRET=${POSTAL_API_SECRET}
      - RAILS_ENV=production
      - REDIS_URL=redis://redis:6379/0
    restart: 'unless-stopped'
    volumes:
      - vendor_bundle:/opt/projects/packagedapp/vendor/bundle:cached
      - type: bind
        source: ./volumes/root
        target: /root
      - type: bind
        source: ./
        target: /opt/projects/packagedapp

  caddy:
    image: caddy:2.7.6
    container_name: caddy
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

  sidekiq:
    image: piousbox/ruby275-nginx:0.0.16
    command: >
      sh -c "/opt/rbenv/shims/bundle exec sidekiq -C config/sidekiq.yml"
    container_name: sidekiq
    depends_on:
      - redis
      - mongo
      - app
    environment:
      - AWS_REGION=us-east-1
      - RAILS_ENV=production
      - REDIS_URL=redis://redis:6379/0

      - PORT=9002
      - EMAIL=${EMAIL}
      - PASSWORD=${PASSWORD}
    volumes:
      - vendor_bundle:/opt/projects/packagedapp/vendor/bundle:cached
      - type: bind
        source: ./volumes/root
        target: /root
      - type: bind
        source: ./
        target: /opt/projects/packagedapp
    restart: unless-stopped
    # networks:
    #   - internal_db_net

  localstack:
    image: localstack/localstack:3.7.0
    container_name: localstack
    environment:
      - SERVICES=s3:5002
      - DEFAULT_REGION=us-east-1
      - DATA_DIR=/opt/localstack/data
      ## LocalStack configuration: https://docs.localstack.cloud/references/configuration/
      # - DEBUG=${DEBUG:-0}
    networks:
      - internal_db_net
    ports:
      - "127.0.0.1:4566:4566" # LocalStack Gateway. host:container
      - "127.0.0.1:4510-4559:4510-4559"  # external services port range
    volumes:
      # - type: bind
      #   source: ./volumes/localstack_development_data
      #   target: /var/lib/localstack
      - localstack_data:/var/lib/localstack
      - type: bind
        source: ./tmp
        target: /opt/tmp
      - "/var/run/docker.sock:/var/run/docker.sock"
      - ./db/seed_localstack:/etc/localstack/init/ready.d
    restart: 'unless-stopped'

  mariadb:
    container_name: mariadb
    image: mariadb:10.4
    environment:
      MARIADB_DATABASE: postal
      MARIADB_ROOT_PASSWORD: postal
    networks:
      - internal_db_net
    ports:
      - "127.0.0.1:3306:3306"
    restart: always
    volumes:
      - mariadb_data:/var/lib/mysql

  ## no network at all.
  mongo:
    container_name: mongo
    image: mongodb/mongodb-community-server:5.0.7-ubuntu2004
    # networks:
    #   - internal_db_net
    # ports:
    #   - "127.0.0.1:27037:27017"
    volumes:
      # - type: bind
      #   source: ./volumes/mongo_data
      #   target: /data/db
      - mongo_data:/data/db
    restart: 'unless-stopped'

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    # volumes:
    #   - redis_data:/data
    # networks:
    #   - internal_db_net
    healthcheck:
        test: ["CMD", "redis-cli", "ping"]
        interval: 5s
        timeout: 3s
        retries: 10

  postal_runner:
    container_name: postal_runner
    profiles: ["tools"]
    image: ghcr.io/postalserver/postal:3.3.5
    command: postal
    network_mode: host
    volumes:
      - /opt/projects/annesque_email/config/postal:/config

  postal_smtp:
    container_name: postal_smtp
    image: ghcr.io/postalserver/postal:3.3.5
    command: postal smtp-server
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - /opt/projects/annesque_email/config/postal:/config
    restart: unless-stopped

  postal_web:
    container_name: postal_web
    image: ghcr.io/postalserver/postal:3.3.5
    command: postal web-server
    network_mode: host
    volumes:
      - /opt/projects/annesque_email/config/postal:/config
    restart: unless-stopped

  postal_worker:
    container_name: postal_worker
    image: ghcr.io/postalserver/postal:3.3.5
    command: postal worker
    network_mode: host
    volumes:
      - /opt/projects/annesque_email/config/postal:/config
    restart: unless-stopped

networks:
  internal_db_net:
    # internal: true
    external: true

volumes:
  caddy_data:
  caddy_config:
  localstack_data:
  mariadb_data:
  mongo_data:
  vendor_bundle:



