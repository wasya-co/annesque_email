---
- hosts: ubuntu
  tasks:
    - file:
        path: /opt/projects
        state: directory

    - git:
        repo: https://github.com/wasya-co/annesque_email.git
        dest: /opt/projects/annesque_email
        version: 0.1.0
        accept_hostkey: true

    - name: Create symlink for postal binary
      ansible.builtin.file:
        src: /opt/projects/annesque_email/bin/postal
        dest: /usr/bin/postal
        state: link
        force: yes

    - ansible.builtin.include_role:
        name: roles/nginx
        tasks_from: proxy-vsites


