
development:
  clients:
    default:
      database: annesque_email_development
      hosts:
        - localhost:27017


production:
  clients:
    default:
      database: annesque_email_production
      hosts:
        - mongo:27017

test:
  clients:
    default:
      database: annesque_email_test
      hosts:
        - mongo:27017
      options:
        read:
          mode: :primary
        max_pool_size: 1
